name: Update Colorscheme Sources

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-sources:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Regenerate source palettes
        run: python3 scripts/update-sources.py

      - name: Check flake
        run: nix flake check

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/update-colorscheme-sources
          delete-branch: true
          title: "chore: update colorscheme sources"
          commit-message: "chore: update colorscheme sources"
          body: |
            Regenerates `sources/<colorscheme>.json` from pinned package sources.

            Generated by `.github/workflows/update-sources.yml`.
          labels: automation
